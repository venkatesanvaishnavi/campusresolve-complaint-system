<!DOCTYPE html>
<html>
<head>
    <title>SRMIST Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-card">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
